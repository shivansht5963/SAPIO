<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FFMS API Documentation</title>
    <meta name="description" content="Interactive API documentation for FFMS — Field Force Management System">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.85);
            --bg-code: #f1f5f9;
            --bg-code-dark: #1e293b;
            --border-subtle: rgba(0, 0, 0, 0.07);
            --border-light: rgba(0, 0, 0, 0.04);
            --glass-border: rgba(99, 102, 241, 0.1);
            --accent-primary: #6366f1;
            --accent-secondary: #8b5cf6;
            --accent-cyan: #0891b2;
            --accent-emerald: #059669;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
            --shadow-lg: 0 10px 40px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);

            --method-get: #059669;
            --method-get-bg: #ecfdf5;
            --method-get-border: rgba(5, 150, 105, 0.2);
            --method-post: #2563eb;
            --method-post-bg: #eff6ff;
            --method-post-border: rgba(37, 99, 235, 0.2);
            --method-patch: #d97706;
            --method-patch-bg: #fffbeb;
            --method-patch-border: rgba(217, 119, 6, 0.2);
            --method-put: #ea580c;
            --method-put-bg: #fff7ed;
            --method-put-border: rgba(234, 88, 12, 0.2);
            --method-delete: #dc2626;
            --method-delete-bg: #fef2f2;
            --method-delete-border: rgba(220, 38, 38, 0.2);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* ── Background ── */
        .bg-pattern {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image:
                radial-gradient(circle at 15% 20%, rgba(99, 102, 241, 0.04) 0%, transparent 50%),
                radial-gradient(circle at 85% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
        }

        .bg-pattern::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(99, 102, 241, 0.012) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(99, 102, 241, 0.012) 1px, transparent 1px);
            background-size: 64px 64px;
        }

        /* ── Layout ── */
        .page-wrapper {
            position: relative;
            z-index: 1;
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 24px 80px;
        }

        /* ── Header ── */
        .doc-header {
            margin-bottom: 40px;
            animation: fadeInDown 0.5s ease;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            padding: 7px 16px;
            border-radius: 10px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            box-shadow: var(--shadow-sm);
            transition: all 0.25s ease;
        }

        .back-link:hover {
            color: var(--text-primary);
            border-color: rgba(99, 102, 241, 0.2);
            box-shadow: var(--shadow-md);
        }

        .back-link svg { width: 14px; height: 14px; }

        .version-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 14px;
            border-radius: 100px;
            background: #eef2ff;
            border: 1px solid rgba(99, 102, 241, 0.15);
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--accent-primary);
            letter-spacing: 0.3px;
        }

        .doc-title {
            font-size: clamp(2rem, 4vw, 2.8rem);
            font-weight: 800;
            margin-bottom: 12px;
        }

        .doc-title .gradient-text {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .doc-subtitle {
            font-size: 1rem;
            color: var(--text-secondary);
            max-width: 620px;
        }

        /* ── Base URL bar ── */
        .base-url-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            border-radius: 12px;
            background: var(--bg-code-dark);
            border: 1px solid rgba(30, 41, 59, 0.8);
            margin-top: 24px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.88rem;
            flex-wrap: wrap;
            box-shadow: var(--shadow-md);
        }

        .base-url-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: #94a3b8;
        }

        .base-url-value {
            color: #34d399;
        }

        /* ── Search ── */
        .search-container {
            margin-bottom: 32px;
            animation: fadeInUp 0.6s ease;
        }

        .search-wrapper { position: relative; }

        .search-input {
            width: 100%;
            padding: 14px 20px 14px 48px;
            border-radius: 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.92rem;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-sm);
        }

        .search-input::placeholder { color: var(--text-muted); }

        .search-input:focus {
            border-color: rgba(99, 102, 241, 0.35);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.08), var(--shadow-sm);
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .search-icon svg { width: 18px; height: 18px; }

        /* ── API Group ── */
        .api-group {
            margin-bottom: 36px;
            animation: fadeInUp 0.6s ease;
        }

        .group-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .group-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .group-icon svg {
            width: 18px;
            height: 18px;
        }

        .group-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .group-count {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-muted);
            padding: 3px 10px;
            border-radius: 100px;
            background: rgba(0, 0, 0, 0.03);
            border: 1px solid var(--border-subtle);
        }

        /* ── Endpoint Card ── */
        .endpoint-card {
            border-radius: 14px;
            margin-bottom: 8px;
            overflow: hidden;
            border: 1px solid var(--border-subtle);
            transition: all 0.3s ease;
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            box-shadow: var(--shadow-sm);
        }

        .endpoint-card:hover {
            border-color: rgba(0, 0, 0, 0.1);
            box-shadow: var(--shadow-md);
        }

        .endpoint-card.expanded {
            border-color: rgba(99, 102, 241, 0.2);
            box-shadow: var(--shadow-lg);
        }

        .endpoint-header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 20px;
            cursor: pointer;
            transition: background 0.2s ease;
            user-select: none;
        }

        .endpoint-header:hover {
            background: rgba(0, 0, 0, 0.015);
        }

        /* ── Method badge ── */
        .method-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 5px 12px;
            border-radius: 8px;
            min-width: 62px;
            text-align: center;
            flex-shrink: 0;
        }

        .method-badge.get { background: var(--method-get-bg); color: var(--method-get); border: 1px solid var(--method-get-border); }
        .method-badge.post { background: var(--method-post-bg); color: var(--method-post); border: 1px solid var(--method-post-border); }
        .method-badge.patch { background: var(--method-patch-bg); color: var(--method-patch); border: 1px solid var(--method-patch-border); }
        .method-badge.put { background: var(--method-put-bg); color: var(--method-put); border: 1px solid var(--method-put-border); }
        .method-badge.delete { background: var(--method-delete-bg); color: var(--method-delete); border: 1px solid var(--method-delete-border); }

        .endpoint-path {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.86rem;
            color: var(--text-primary);
            flex: 1;
        }

        .endpoint-path .param { color: var(--accent-primary); }

        .endpoint-summary {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: none;
        }

        @media (min-width: 700px) {
            .endpoint-summary { display: block; }
        }

        .expand-icon {
            width: 18px;
            height: 18px;
            color: var(--text-muted);
            transition: transform 0.3s ease;
            flex-shrink: 0;
        }

        .endpoint-card.expanded .expand-icon {
            transform: rotate(180deg);
        }

        /* ── Endpoint Body ── */
        .endpoint-body {
            display: none;
            border-top: 1px solid var(--border-subtle);
        }

        .endpoint-card.expanded .endpoint-body { display: block; }

        .endpoint-content { padding: 24px 20px; }

        .endpoint-description {
            font-size: 0.92rem;
            color: var(--text-secondary);
            margin-bottom: 24px;
            line-height: 1.7;
        }

        /* ── Info sections ── */
        .info-section { margin-bottom: 24px; }
        .info-section:last-child { margin-bottom: 0; }

        .info-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        /* ── Badges ── */
        .badge-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 8px;
        }

        .badge svg {
            width: 13px;
            height: 13px;
            flex-shrink: 0;
        }

        .badge-auth {
            background: #fffbeb;
            border: 1px solid rgba(217, 119, 6, 0.2);
            color: #b45309;
        }

        .badge-public {
            background: #ecfdf5;
            border: 1px solid rgba(5, 150, 105, 0.2);
            color: #047857;
        }

        .badge-role {
            background: #f5f3ff;
            border: 1px solid rgba(139, 92, 246, 0.15);
            color: #7c3aed;
        }

        .badge-scope {
            background: #ecfeff;
            border: 1px solid rgba(8, 145, 178, 0.15);
            color: #0e7490;
        }

        /* ── Schema Table ── */
        .schema-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            border: 1px solid var(--border-subtle);
            border-radius: 10px;
            overflow: hidden;
        }

        .schema-table th {
            text-align: left;
            padding: 10px 14px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            background: rgba(0, 0, 0, 0.02);
            border-bottom: 1px solid var(--border-subtle);
        }

        .schema-table td {
            padding: 10px 14px;
            border-bottom: 1px solid var(--border-light);
            vertical-align: top;
        }

        .schema-table tr:last-child td { border-bottom: none; }

        .field-name {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82rem;
            color: var(--accent-primary);
            font-weight: 500;
        }

        .field-type {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.78rem;
            color: var(--accent-secondary);
        }

        .field-required {
            font-size: 0.68rem;
            font-weight: 700;
            color: #dc2626;
            text-transform: uppercase;
        }

        .field-optional {
            font-size: 0.68rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .field-desc {
            color: var(--text-secondary);
            font-size: 0.82rem;
        }

        /* ── Code Blocks ── */
        .code-block-wrapper {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            background: var(--bg-code-dark);
            border: 1px solid rgba(30, 41, 59, 0.6);
            box-shadow: var(--shadow-sm);
        }

        .code-block-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .code-block-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #94a3b8;
        }

        .code-block-status {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 6px;
        }

        .status-200 { background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.25); }
        .status-201 { background: rgba(59, 130, 246, 0.15); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.25); }
        .status-204 { background: rgba(148, 163, 184, 0.15); color: #94a3b8; border: 1px solid rgba(148, 163, 184, 0.25); }
        .status-400 { background: rgba(245, 158, 11, 0.15); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.25); }
        .status-401 { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.25); }
        .status-403 { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.25); }
        .status-404 { background: rgba(245, 158, 11, 0.15); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.25); }

        pre.code-block {
            padding: 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            line-height: 1.6;
            color: #cbd5e1;
            overflow-x: auto;
            white-space: pre;
        }

        pre.code-block .json-key { color: #7dd3fc; }
        pre.code-block .json-string { color: #86efac; }
        pre.code-block .json-number { color: #fbbf24; }
        pre.code-block .json-bool { color: #c084fc; }
        pre.code-block .json-null { color: #94a3b8; }

        /* ── Tabs ── */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 14px;
            background: rgba(0, 0, 0, 0.02);
            border-radius: 10px;
            padding: 4px;
            border: 1px solid var(--border-subtle);
        }

        .tab-btn {
            font-family: 'Inter', sans-serif;
            font-size: 0.78rem;
            font-weight: 600;
            padding: 7px 18px;
            border-radius: 8px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab-btn:hover { color: var(--text-secondary); }

        .tab-btn.active {
            background: var(--bg-secondary);
            color: var(--accent-primary);
            box-shadow: var(--shadow-sm);
        }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* ── Query Params ── */
        .query-params {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .query-param {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 5px 14px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.02);
            border: 1px solid var(--border-subtle);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.78rem;
            color: var(--text-secondary);
        }

        .query-param .qp-name { color: var(--accent-primary); font-weight: 500; }

        /* ── Animations ── */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hidden { display: none !important; }

        @media (max-width: 600px) {
            .endpoint-header { flex-wrap: wrap; gap: 8px; }
            .base-url-bar { font-size: 0.76rem; }
            .schema-table { font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <div class="bg-pattern"></div>

    <div class="page-wrapper">

        <!-- Header -->
        <header class="doc-header">
            <div class="header-top">
                <a href="/" class="back-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"/>
                        <polyline points="12 19 5 12 12 5"/>
                    </svg>
                    Back to Home
                </a>
                <span class="version-badge">OAS 3.0 · v1.0.0</span>
            </div>

            <h1 class="doc-title">
                <span class="gradient-text">FFMS</span> API Reference
            </h1>
            <p class="doc-subtitle">
                Complete REST API documentation for the Field Force Management System. 
                All endpoints require JWT Bearer authentication unless noted otherwise.
            </p>

            <div class="base-url-bar">
                <span class="base-url-label">Base URL</span>
                <span class="base-url-value">https://sapio.onrender.com/api</span>
            </div>
        </header>

        <!-- Search -->
        <div class="search-container">
            <div class="search-wrapper">
                <span class="search-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                </span>
                <input type="text" class="search-input" id="search-input" placeholder="Search endpoints... (e.g. login, tasks, visits)">
            </div>
        </div>

        <!-- API Endpoints -->
        <div id="api-container"></div>

    </div>

    <script>
    // ════════════════════════════════════════════════
    // SVG Icons for groups (replacing emojis)
    // ════════════════════════════════════════════════
    const ICONS = {
        auth: `<svg viewBox="0 0 24 24" fill="none" stroke="#b45309" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/><circle cx="12" cy="16" r="1"/></svg>`,
        users: `<svg viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
        tasks: `<svg viewBox="0 0 24 24" fill="none" stroke="#4f46e5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>`,
        visits: `<svg viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`,
        logs: `<svg viewBox="0 0 24 24" fill="none" stroke="#0891b2" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="12 8 12 12 14 14"/><circle cx="12" cy="12" r="10"/></svg>`,
        reports: `<svg viewBox="0 0 24 24" fill="none" stroke="#db2777" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg>`,
        // Badge inline icons
        lock: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`,
        unlock: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>`,
        target: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>`

                            { agent_username: "agent_ravi", agent_employee_id: "EMP005", visit_count: 8, avg_completion_minutes: 45.5 },
                            { agent_username: "agent_priya", agent_employee_id: "EMP006", visit_count: 12, avg_completion_minutes: 38.2 }
                        ]
                    },
                    errorResponses: []
                },
                {
                    method: "GET",
                    path: "/reports/dashboard/",
                    summary: "Comprehensive dashboard summary",
                    description: "Returns a scoped summary with: task counts by status, visit summary (total, completed, started, high-risk count), and the 5 most recent activity logs. The ultimate overview endpoint.",
                    auth: "Bearer Token",
                    roles: ["Admin", "Auditor", "Regional Manager", "Team Lead", "Field Agent"],
                    scoping: "Admin → global · RM → region · TL → team · Agent → self-scoped",
                    requestBody: null,
                    responseExample: {
                        status: 200,
                        body: {
                            tasks: { total: 25, by_status: { pending: 5, assigned: 3, in_progress: 8, completed: 7, cancelled: 2 } },
                            visits: { total: 18, completed: 15, started: 3, high_risk: 2 },
                            recent_activity: [{
                                id: 100,
                                user_profile: { id: 5, employee_id: "EMP005", username: "agent_ravi", first_name: "Ravi", role_name: "field_agent" },
                                action: "completed", entity_type: "visit", entity_id: 10,
                                description: "Visit completed for task 1.",
                                timestamp: "2026-05-21T10:30:00+05:30"
                            }]
                        }
                    },
                    errorResponses: []
                }
            ]
        }
    ];

    // ════════════════════════════════════════════════
    // Rendering
    // ════════════════════════════════════════════════

    function syntaxHighlightJSON(json, indent = 2) {
        if (json === null) return '<span class="json-null">No content</span>';
        const str = JSON.stringify(json, null, indent);
        return str.replace(
            /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
            (match) => {
                let cls = 'json-number';
                if (/^"/.test(match)) {
                    cls = /:$/.test(match) ? 'json-key' : 'json-string';
                } else if (/true|false/.test(match)) {
                    cls = 'json-bool';
                } else if (/null/.test(match)) {
                    cls = 'json-null';
                }
                return `<span class="${cls}">${match}</span>`;
            }
        );
    }

    function renderPathWithParams(path) {
        return path.replace(/\{(\w+)\}/g, '<span class="param">{$1}</span>');
    }

    function renderEndpointCard(endpoint, index) {
        const method = endpoint.method.toLowerCase();
        const cardId = `endpoint-${index}`;
        let bodyHTML = '';

        bodyHTML += `<p class="endpoint-description">${endpoint.description}</p>`;

        // Auth & Roles
        bodyHTML += `<div class="info-section">
            <div class="info-label">Authentication & Authorization</div>
            <div class="badge-row">
                <span class="badge ${endpoint.auth === 'Public' ? 'badge-public' : 'badge-auth'}">
                    ${endpoint.auth === 'Public' ? ICONS.unlock : ICONS.lock} ${endpoint.auth === 'Public' ? 'Public' : endpoint.auth}
                </span>
                ${endpoint.roles.map(r => `<span class="badge badge-role">${r}</span>`).join('')}
                ${endpoint.scoping ? `<span class="badge badge-scope">${ICONS.target} ${endpoint.scoping}</span>` : ''}
            </div>
        </div>`;

        // Path Parameters
        if (endpoint.pathParams && endpoint.pathParams.length > 0) {
            bodyHTML += `<div class="info-section">
                <div class="info-label">Path Parameters</div>
                <table class="schema-table">
                    <thead><tr><th>Name</th><th>Type</th><th>Description</th></tr></thead>
                    <tbody>${endpoint.pathParams.map(p => `
                        <tr><td><span class="field-name">${p.name}</span></td><td><span class="field-type">${p.type}</span></td><td><span class="field-desc">${p.desc}</span></td></tr>
                    `).join('')}</tbody>
                </table>
            </div>`;
        }

        // Query Parameters
        if (endpoint.queryParams && endpoint.queryParams.length > 0) {
            bodyHTML += `<div class="info-section">
                <div class="info-label">Query Parameters</div>
                <div class="query-params">
                    ${endpoint.queryParams.map(p => `<span class="query-param"><span class="qp-name">?${p.name}</span> — ${p.desc}</span>`).join('')}
                </div>
            </div>`;
        }

        // Request Body
        if (endpoint.requestBody && endpoint.requestBody.length > 0) {
            bodyHTML += `<div class="info-section">
                <div class="info-label">Request Body <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text-muted);font-size:0.7rem;">application/json</span></div>
                <table class="schema-table">
                    <thead><tr><th>Field</th><th>Type</th><th>Required</th><th>Description</th></tr></thead>
                    <tbody>${endpoint.requestBody.map(f => `
                        <tr>
                            <td><span class="field-name">${f.name}</span></td>
                            <td><span class="field-type">${f.type}</span></td>
                            <td>${f.required ? '<span class="field-required">required</span>' : '<span class="field-optional">optional</span>'}</td>
                            <td><span class="field-desc">${f.desc}</span></td>
                        </tr>
                    `).join('')}</tbody>
                </table>
            </div>`;
        }

        // Responses
        const hasErrors = endpoint.errorResponses && endpoint.errorResponses.length > 0;
        const tabId = `tabs-${index}`;

        bodyHTML += `<div class="info-section"><div class="info-label">Responses</div>`;

        if (hasErrors) {
            bodyHTML += `<div class="tabs" data-tab-group="${tabId}">
                <button class="tab-btn active" data-tab="${tabId}-success">Success</button>
                <button class="tab-btn" data-tab="${tabId}-errors">Errors</button>
            </div>`;
        }

        const statusText = { 200: 'OK', 201: 'Created', 204: 'No Content' };
        bodyHTML += `<div class="tab-panel active" id="${tabId}-success">
            <div class="code-block-wrapper">
                <div class="code-block-header">
                    <span class="code-block-label">Response</span>
                    <span class="code-block-status status-${endpoint.responseExample.status}">${endpoint.responseExample.status} ${statusText[endpoint.responseExample.status] || ''}</span>
                </div>
                <pre class="code-block">${endpoint.responseExample.body === null ? '<span class="json-null">// No response body</span>' : syntaxHighlightJSON(endpoint.responseExample.body)}</pre>
            </div>
        </div>`;

        if (hasErrors) {
            const errText = { 400: 'Bad Request', 401: 'Unauthorized', 403: 'Forbidden', 404: 'Not Found' };
            bodyHTML += `<div class="tab-panel" id="${tabId}-errors">`;
            endpoint.errorResponses.forEach(err => {
                bodyHTML += `<div class="code-block-wrapper" style="margin-bottom: 10px;">
                    <div class="code-block-header">
                        <span class="code-block-label">Error Response</span>
                        <span class="code-block-status status-${err.status}">${err.status} ${errText[err.status] || 'Error'}</span>
                    </div>
                    <pre class="code-block">${syntaxHighlightJSON(err.body)}</pre>
                </div>`;
            });
            bodyHTML += `</div>`;
        }

        bodyHTML += `</div>`;

        return `
        <div class="endpoint-card" id="${cardId}" data-search="${endpoint.method} ${endpoint.path} ${endpoint.summary}">
            <div class="endpoint-header" onclick="toggleEndpoint('${cardId}')">
                <span class="method-badge ${method}">${endpoint.method}</span>
                <span class="endpoint-path">${renderPathWithParams(endpoint.path)}</span>
                <span class="endpoint-summary">${endpoint.summary}</span>
                <svg class="expand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="6 9 12 15 18 9"/>
                </svg>
            </div>
            <div class="endpoint-body">
                <div class="endpoint-content">${bodyHTML}</div>
            </div>
        </div>`;
    }

    function renderAll() {
        const container = document.getElementById('api-container');
        let html = '';
        let globalIndex = 0;

        API_DATA.forEach(group => {
            html += `<div class="api-group" data-group="${group.group}">
                <div class="group-header">
                    <div class="group-icon" style="background:${group.iconBg};border:1px solid ${group.iconBorder}">${ICONS[group.icon]}</div>
                    <h2 class="group-title">${group.group}</h2>
                    <span class="group-count">${group.endpoints.length} endpoint${group.endpoints.length !== 1 ? 's' : ''}</span>
                </div>`;
            group.endpoints.forEach(ep => {
                html += renderEndpointCard(ep, globalIndex);
                globalIndex++;
            });
            html += `</div>`;
        });

        container.innerHTML = html;
    }

    // ════════════════════════════════════════════════
    // Interactivity
    // ════════════════════════════════════════════════

    function toggleEndpoint(cardId) {
        document.getElementById(cardId).classList.toggle('expanded');
    }

    document.addEventListener('click', (e) => {
        if (e.target.classList.contains('tab-btn')) {
            const targetTab = e.target.dataset.tab;
            e.target.closest('.tabs').querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            e.target.classList.add('active');
            const section = e.target.closest('.info-section');
            section.querySelectorAll('.tab-panel').forEach(panel => {
                panel.classList.toggle('active', panel.id === targetTab);
            });
        }
    });

    document.getElementById('search-input').addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase().trim();
        document.querySelectorAll('.api-group').forEach(group => {
            const cards = group.querySelectorAll('.endpoint-card');
            let visible = 0;
            cards.forEach(card => {
                const match = !query || card.dataset.search.toLowerCase().includes(query);
                card.classList.toggle('hidden', !match);
                if (match) visible++;
            });
            group.classList.toggle('hidden', visible === 0 && !!query);
        });
    });

    renderAll();
    </script>

</body>
